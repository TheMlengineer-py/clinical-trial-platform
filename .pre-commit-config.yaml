repos:
  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace # remove trailing spaces
      - id: end-of-file-fixer # ensure files end with newline
      - id: check-yaml # validate YAML syntax (workflows, config)
      - id: check-json # validate JSON syntax
      - id: check-added-large-files # block accidentally committed large files
        args: ["--maxkb=500"]
      - id: check-merge-conflict # block unresolved merge conflict markers

  # ── Frontend — Prettier formatting ────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|css|json|md|yml|yaml)$
        exclude: (package-lock\.json|\.env.*)
