spring:
  datasource:
    url: jdbc:h2:mem:trialdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
